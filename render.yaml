services:
  - type: web
    name: mixermate-store
    runtime: node
    plan: starter
    buildCommand: echo "no build needed"
    startCommand: HOST=0.0.0.0 node --experimental-sqlite server.js
    disk:
      name: store-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DB_FILE
        value: /var/data/db.sqlite
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SITE_URL
        sync: false
